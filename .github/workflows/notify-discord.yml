name: Notify Discord on PR Merged
on:
  pull_request:
    types: [closed]
jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"PR #${{ github.event.pull_request.number }} merged\",
                \"description\": \"**${{ github.event.pull_request.title }}**\",
                \"url\": \"${{ github.event.pull_request.html_url }}\",
                \"color\": 5763719,
                \"fields\": [
                  {\"name\": \"Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true}
                ]
              }]
            }"
